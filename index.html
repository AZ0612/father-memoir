<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>辗转南北的半生岁月 · 父亲回忆录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #050505;
  --bg-mid: #0a0a0a;
  --bark-dark: #111111;
  --bark-mid: #1a1a1a;
  --bark-light: #2a2a2a;
  --ring-warm: #666666;
  --ring-gold: #999999;
  --ring-active: #e0e0e0;
  --gold-glow: #ffffff;
  --ink: #d0d0d0;
  --ink-soft: #888888;
  --shadow-soft: rgba(0,0,0,0.5);
  --shadow-deep: rgba(0,0,0,0.7);
  --safe-bottom: env(safe-area-inset-bottom, 18px);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background: var(--bg-deep);
  font-family: 'Noto Serif SC', 'STSong', 'Songti SC', serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse at 50% 45%, rgba(40,40,40,0.3) 0%, transparent 70%);
}

.scene {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}

canvas {
  display: block;
  touch-action: manipulation;
}

.hint {
  position: fixed; bottom: calc(var(--safe-bottom) + 50px);
  left: 50%; transform: translateX(-50%);
  font-size: clamp(12px, 3.5vw, 14px); letter-spacing: 0.1em;
  color: var(--ink-soft);
  opacity: 0.7;
  pointer-events: none;
  z-index: 10;
  transition: opacity 0.6s;
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 0 12px rgba(0,0,0,0.5);
}

.hint.fading { opacity: 0; }

.page-title {
  position: fixed; top: calc(env(safe-area-inset-top, 20px) + 16px);
  left: 50%; transform: translateX(-50%);
  font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
  font-size: clamp(15px, 4.5vw, 20px); font-weight: 300;
  letter-spacing: 0.1em;
  white-space: nowrap;
  color: var(--ring-gold);
  pointer-events: none; z-index: 5;
  opacity: 0.85;
  text-shadow: 0 0 16px rgba(180,180,180,0.3);
}

/* 回忆录文字卡片 */
.text-card {
  position: fixed; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
  transition: opacity 0.5s;
}
.text-card.visible { pointer-events: auto; opacity: 1; }

.text-card-inner {
  background: linear-gradient(180deg, rgba(18,18,18,0.96), rgba(10,10,10,0.96));
  border: 1px solid rgba(180,180,180,0.15);
  border-radius: 16px;
  padding: 24px 20px 18px;
  max-width: min(380px, 90vw);
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 12px 48px var(--shadow-deep), 0 0 24px rgba(255,255,255,0.05);
  -webkit-overflow-scrolling: touch;
  font-family: 'Noto Serif SC', serif;
}

.text-card-year {
  font-family: 'Cormorant Garamond', 'Georgia', serif;
  font-size: clamp(30px, 9vw, 38px); font-weight: 300;
  color: var(--ring-active);
  line-height: 1;
  margin-bottom: 4px;
  text-shadow: 0 0 12px rgba(255,255,255,0.2);
}

.text-card-title {
  font-size: clamp(17px, 5vw, 20px); font-weight: 600;
  color: var(--ink);
  margin-bottom: 16px;
  letter-spacing: 0.06em;
}

.text-card-body {
  font-size: clamp(14px, 4.2vw, 16px); line-height: 2;
  color: var(--ink);
  font-weight: 300;
  letter-spacing: 0.04em;
  white-space: pre-line;
}

.text-card-close {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 20px;
  padding: 10px 22px;
  background: linear-gradient(135deg, #999999, #555555);
  color: #0a0a0a;
  border: none; border-radius: 24px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; letter-spacing: 0.1em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.text-card-close:active { transform: scale(0.96); }

/* 音频播放指示器 */
.audio-indicator {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 15; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px;
  background: rgba(10,10,10,0.85);
  border: 1px solid rgba(180,180,180,0.15);
  border-radius: 24px;
  color: var(--ring-active); font-size: 13px;
  opacity: 0; transition: opacity 0.3s;
  backdrop-filter: blur(10px);
}
.audio-indicator.visible { opacity: 1; }
.audio-indicator .wave {
  display: flex; gap: 2px; align-items: flex-end; height: 16px;
}
.audio-indicator .wave span {
  width: 2px; background: var(--ring-active);
  border-radius: 1px;
  animation: wavePulse 0.6s ease-in-out infinite alternate;
}
.audio-indicator .wave span:nth-child(2) { animation-delay: 0.1s; }
.audio-indicator .wave span:nth-child(3) { animation-delay: 0.2s; }
.audio-indicator .wave span:nth-child(4) { animation-delay: 0.3s; }

@keyframes wavePulse {
  0% { height: 6px; }
  100% { height: 16px; }
}

/* 淡出动画——配合水流向下 */
.card-scattering .text-card-inner {
  animation: cardFadeOut 1.5s ease-in forwards;
}
@keyframes cardFadeOut {
  0% { opacity: 1; transform: scale(1) translateY(0); }
  60% { opacity: 0.3; transform: scale(1.01) translateY(15px); }
  100% { opacity: 0; transform: scale(1.02) translateY(30px); }
}
</style>
</head>
<body>
<div class="scene">
  <canvas id="treeCanvas"></canvas>
</div>
<div class="page-title">辗转南北的半生岁月</div>
<div class="hint" id="hint">轻触年轮 · 聆听父亲的故事</div>

<div class="text-card" id="textCard">
  <div class="text-card-inner" id="textCardInner">
    <div class="text-card-year" id="cardYear"></div>
    <div class="text-card-title" id="cardTitle"></div>
    <div class="text-card-body" id="cardBody"></div>
    <button class="text-card-close" id="cardClose">
      <span>✧</span> 让记忆如水流逝
    </button>
  </div>
</div>

<div class="audio-indicator" id="audioIndicator">
  <span>🎧</span>
  <span id="audioLabel">播放中</span>
  <div class="wave"><span></span><span></span><span></span><span></span></div>
</div>
<audio id="audioPlayer" preload="none"></audio>

<script>
/* ============================================================
   回忆录数据 —— 修改这里的年份、文字和音频路径即可
   ============================================================ */
const MEMOIR_DATA = [
  {
    year: 1961,
    title: "绍兴降生",

    audio: "audio/1961.mp3",

  },
  {
    year: 1963,
    title: "扎根齐鲁",
    emoji: "🏠",
    audio: "audio/1963.mp3",
    text: "1963年前后，父亲带着全家搬迁落户山东临朐，我们一家人自此扎根齐鲁大地。\n\n父亲是五八年大裁军中，十万官兵集体转业开垦北大荒的北大荒人。母亲原籍江南苏州，祖居苏州桃花坞，七岁起随姥姥在绍兴东关长大。母亲难以忍受东北漫长严寒，常年冻伤生疮，加之姥姥已在东北病逝，父亲下定决心举家南迁。\n\n为此，父亲从副处级职务降为科级干部，先后辗转辛寨公社、七贤公社，最终定居柳山公社。"
  },
  {
    year: 1967,
    title: "柳山求学",
    emoji: "📖",
    audio: "audio/1967.mp3",
    text: "我的童年与少年时光全部在临朐柳山度过。先后就读柳山寨小学、柳山公社联合中学、临朐第八中学。\n\n我家紧挨柳山寨小学校园，年纪尚幼便被父亲送去求学。因年龄小几次被拒收，几经家长沟通协调，才得以在六七年冬天插班入校，时年六周岁。\n\n受学制改革影响，初中由冬季毕业改为夏季毕业，学制顺延半年。我前后读了九年半，是九年半义务教育的受益者。"
  },
  {
    year: 1976,
    title: "高中岁月",
    emoji: "🎭",
    audio: "audio/1976.mp3",
    text: "读书岁月恰逢特殊历史阶段。小学是文革初期，我们都是毛主席的红小兵。一年级班主任李师珍老师给我起了个“赵学东”的名字，意为随时认真学习毛泽东思想。\n\n初中时赶上批林批孔运动，我曾扮演“林秃子”，摇头晃脑阴阳怪气地说：“悠悠万事，唯此为大，克己复礼！”同学们哄笑不已。我也曾参演学校排演的舞蹈剧《知识青年下乡来》。\n\n1976年9月9日，伟大领袖毛主席逝世。举国悲痛，万民哀伤。我就在高中大操场上参加悼念活动，记得中午时分大雨滂沱，电闪雷鸣。"
  },
  {
    year: 1977,

  {

  },
  {
    year: 1979,
    title: "邮路漫漫",
    emoji: "📬",
    audio: "audio/1979.mp3",
    text: "结业后我被分配到蒋峪镇邮电支局，成为一名山区投递员，分管两条偏远山区邮路，一条百余华里，另一条148华里，隔日轮换出车。\n\n别的投递员两日轮休一次，我却几乎天天奔波在山间邮路上。\n\n入职不到一个月，当地降下罕见大雪，积雪深及膝盖。我身着棉靴照常外出走村送信，冒雪完成全线投递任务。这也是我邮电生涯中第一次踏雪送件。"
  }
];

/* ============================================================
   Canvas 初始化
   ============================================================ */
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeTreeLayout();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 300));

/* ============================================================
   年轮树布局计算
   ============================================================ */
const tree = {
  cx: 0, cy: 0,
  totalRadius: 0,
  ringWidth: 0,
  rings: [],  // { innerR, outerR, data, midAngle }
};

function computeTreeLayout() {
  const n = MEMOIR_DATA.length;
  const maxR = Math.min(W, H) * 0.35;
  const coreR = maxR * 0.12;
  tree.totalRadius = maxR;
  tree.cx = W / 2;
  tree.cy = H * 0.5;
  tree.ringWidth = (maxR - coreR) / n;

  tree.rings = MEMOIR_DATA.map((data, i) => {
    const innerR = coreR + i * tree.ringWidth;
    const outerR = i === n - 1 ? maxR : coreR + (i + 1) * tree.ringWidth;
    return { innerR, outerR, data, midR: (innerR + outerR) / 2 };
  });

  computeRingPaths();
  initRingParticles();
}

/* ============================================================
   年轮树绘制——不规则边界 + 深浅年轮带 + 放射木纹
   ============================================================ */

// Perlin 噪声扭曲半径——让年轮边界呈有机波浪形
function noisyRadius(baseR, angle, seed) {
  const nx = Math.cos(angle);
  const ny = Math.sin(angle);
  const n1 = perlin(nx * 1.5 + seed, ny * 1.5 + seed, seed * 0.3) * 0.5 + 0.5;
  const n2 = perlin(nx * 4 + seed * 2, ny * 4 + seed * 2, seed * 0.5) * 0.5 + 0.5;
  const distortion = (n1 - 0.5) * baseR * 0.07 + (n2 - 0.5) * baseR * 0.025;
  return Math.max(2, baseR + distortion);
}

// 缓存年轮路径（避免每帧重复计算 Perlin 噪声）
let ringPathCache = [];
let fineRingCache = [];
let crackPaths = [];
let treeKnots = [];

function computeRingPaths() {
  ringPathCache = [];
  fineRingCache = [];
  crackPaths = [];
  treeKnots = [];
  const steps = 90;

  // 7个数据年轮
  tree.rings.forEach((ring, idx) => {
    const outer = [], inner = [], mid = [];
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * Math.PI * 2;
      outer.push({ a, r: noisyRadius(ring.outerR, a, ring.data.year + 0.7) });
      inner.push({ a, r: noisyRadius(ring.innerR, a, ring.data.year) });
      mid.push({ a, r: noisyRadius((ring.innerR + ring.outerR) * 0.5, a, ring.data.year + 0.3) });
    }
    ringPathCache.push({ outer, inner, mid });

    if (idx === 2 || idx === 4) {
      const ka = ring.data.year * 0.7;
      treeKnots.push({
        x: tree.cx + Math.cos(ka) * ring.midR,
        y: tree.cy + Math.sin(ka) * ring.midR,
        rx: 3 + (ring.outerR - ring.innerR) * 0.25,
        ry: 5 + (ring.outerR - ring.innerR) * 0.35,
        angle: ka,
      });
    }
  });

  // 细密装饰环线——指纹质感
  const coreR = tree.totalRadius * 0.12;
  const numFine = 55;
  for (let i = 0; i < numFine; i++) {
    const t = i / numFine;
    const r = coreR + (tree.totalRadius - coreR) * t;
    const points = [];
    const seed = i * 0.45 + 0.3;
    for (let j = 0; j <= steps; j++) {
      const a = (j / steps) * Math.PI * 2;
      points.push({ a, r: noisyRadius(r, a, seed) });
    }
    fineRingCache.push({
      points,
      lineWidth: 0.3 + Math.abs(Math.sin(i * 2.7)) * 0.5,
      opacity: 0.08 + Math.abs(Math.sin(i * 1.3)) * 0.18,
    });
  }

  // 白色裂纹——从中心向外辐射
  const numCracks = 5;
  for (let i = 0; i < numCracks; i++) {
    const baseAngle = (i / numCracks) * Math.PI * 2 + Math.random() * 0.8;
    const pts = [];
    const segs = 28;
    let angle = baseAngle;
    for (let s = 0; s <= segs; s++) {
      const t = s / segs;
      const r = tree.totalRadius * t * (0.92 + Math.random() * 0.08);
      angle += (Math.random() - 0.5) * 0.07;
      pts.push({
        x: tree.cx + Math.cos(angle) * r,
        y: tree.cy + Math.sin(angle) * r,
      });
    }
    crackPaths.push({
      points: pts,
      width: 0.6 + Math.random() * 1.4,
      opacity: 0.2 + Math.random() * 0.2,
    });
  }
}

// 沿缓存的路径点描绘 Canvas 路径
function tracePath(points) {
  ctx.beginPath();
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    const x = tree.cx + Math.cos(p.a) * p.r;
    const y = tree.cy + Math.sin(p.a) * p.r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
}
function drawTreeBackground() {
  const grad = ctx.createRadialGradient(tree.cx, tree.cy, 0, tree.cx, tree.cy, tree.totalRadius);
  grad.addColorStop(0, '#1a1a1a');
  grad.addColorStop(0.3, '#121212');
  grad.addColorStop(0.7, '#0a0a0a');
  grad.addColorStop(1, '#050505');

  const lastCache = ringPathCache[ringPathCache.length - 1];
  if (lastCache) {
    tracePath(lastCache.outer);
  } else {
    ctx.beginPath();
    ctx.arc(tree.cx, tree.cy, tree.totalRadius + 4, 0, Math.PI * 2);
  }
  ctx.fillStyle = grad;
  ctx.fill();
}

// 细密环线——指纹质感
function drawFineRings() {
  fineRingCache.forEach(ring => {
    tracePath(ring.points);
    ctx.strokeStyle = `rgba(180,180,180,${ring.opacity})`;
    ctx.lineWidth = ring.lineWidth;
    ctx.stroke();
  });
}

// 白色裂纹——贯穿年轮
function drawCracks() {
  crackPaths.forEach(crack => {
    ctx.beginPath();
    ctx.moveTo(crack.points[0].x, crack.points[0].y);
    for (let i = 1; i < crack.points.length; i++) {
      ctx.lineTo(crack.points[i].x, crack.points[i].y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${crack.opacity})`;
    ctx.lineWidth = crack.width;
    ctx.stroke();
  });
}

function drawWoodGrain(ring, cache) {
  ctx.save();
  tracePath(cache.outer);
  tracePath(cache.inner);
  ctx.clip('evenodd');

  const numLines = cache.outer.length - 1;
  for (let i = 0; i < numLines; i++) {
    if (Math.sin(i * 7.3 + ring.data.year) < -0.25) continue;

    const pIn = cache.inner[i];
    const pOut = cache.outer[i];
    const x1 = tree.cx + Math.cos(pIn.a) * pIn.r;
    const y1 = tree.cy + Math.sin(pIn.a) * pIn.r;
    const x2 = tree.cx + Math.cos(pOut.a) * pOut.r;
    const y2 = tree.cy + Math.sin(pOut.a) * pOut.r;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(120,120,120,${0.015 + Math.abs(Math.sin(i * 5.7 + ring.data.year)) * 0.03})`;
    ctx.lineWidth = 0.4;
    ctx.stroke();
  }
  ctx.restore();
}

function drawRing(ring, state) {
  const isActive = state === 'active';
  const isHover = state === 'hover';
  const cacheIdx = tree.rings.indexOf(ring);
  const cache = ringPathCache[cacheIdx];
  if (!cache) return;

  // 数据年轮边界——白色高亮线
  tracePath(cache.outer);
  if (isActive) {
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 14;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    tracePath(cache.outer);
    tracePath(cache.inner);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fill('evenodd');
  } else if (isHover) {
    ctx.strokeStyle = 'rgba(220,220,220,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    tracePath(cache.outer);
    tracePath(cache.inner);
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fill('evenodd');
  } else {
    ctx.strokeStyle = 'rgba(200,200,200,0.18)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  drawWoodGrain(ring, cache);
}

function drawKnots() {
  treeKnots.forEach(knot => {
    ctx.save();
    ctx.translate(knot.x, knot.y);
    ctx.rotate(knot.angle);

    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, knot.rx);
    grad.addColorStop(0, 'rgba(0,0,0,0.6)');
    grad.addColorStop(0.6, 'rgba(20,20,20,0.3)');
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.ellipse(0, 0, knot.rx, knot.ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.restore();
  });
}

function drawBark() {
  const lastCache = ringPathCache[ringPathCache.length - 1];
  if (!lastCache) return;

  tracePath(lastCache.outer);
  ctx.fillStyle = '#050505';
  ctx.fill();

  for (let i = 0; i < lastCache.outer.length - 1; i++) {
    const p = lastCache.outer[i];
    const a = p.a;
    const r1 = p.r;
    const r2 = r1 + 2 + Math.abs(Math.sin(a * 7 + 2)) * 5;

    ctx.beginPath();
    ctx.moveTo(tree.cx + Math.cos(a) * r1, tree.cy + Math.sin(a) * r1);
    ctx.lineTo(tree.cx + Math.cos(a) * r2, tree.cy + Math.sin(a) * r2);
    ctx.strokeStyle = `rgba(0,0,0,${0.5 + Math.abs(Math.sin(a * 11)) * 0.3})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  tracePath(lastCache.outer);
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawCoreRing() {
  const r = tree.rings.length > 0 ? tree.rings[0].innerR : 8;
  const firstCache = ringPathCache[0];

  // 中心白色辉光
  const grad = ctx.createRadialGradient(tree.cx, tree.cy, 0, tree.cx, tree.cy, r * 1.5);
  grad.addColorStop(0, 'rgba(255,255,255,0.3)');
  grad.addColorStop(0.5, 'rgba(180,180,180,0.1)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(tree.cx, tree.cy, r * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // 髓心
  if (firstCache) {
    tracePath(firstCache.inner);
  } else {
    ctx.beginPath();
    ctx.arc(tree.cx, tree.cy, r, 0, Math.PI * 2);
  }
  ctx.fillStyle = '#2a2a2a';
  ctx.fill();

  // 中心放射裂缝
  const cracks = 4;
  for (let i = 0; i < cracks; i++) {
    const a = (i / cracks) * Math.PI * 2 + 0.5;
    ctx.beginPath();
    ctx.moveTo(tree.cx, tree.cy);
    ctx.lineTo(tree.cx + Math.cos(a) * r * 0.85, tree.cy + Math.sin(a) * r * 0.85);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }
}

function drawYearLabels() {
  const total = tree.rings.length;
  tree.rings.forEach((ring, i) => {
    // 均匀分布在右侧 -0.75 ~ +0.75 弧度
    const a = -0.75 + (i / (total - 1)) * 1.5;
    const r = ring.midR;
    const x = tree.cx + Math.cos(a) * r;
    const y = tree.cy + Math.sin(a) * r;

    const isActive = app.activeRingIdx === i;
    const isHover = app.hoveredRingIdx === i;

    ctx.save();
    ctx.font = `${isActive ? 12 : 10}px 'Cormorant Garamond', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (isActive) {
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
    } else if (isHover) {
      ctx.shadowColor = '#aaaaaa';
      ctx.shadowBlur = 6;
      ctx.fillStyle = 'rgba(200,200,200,0.8)';
    } else {
      ctx.fillStyle = 'rgba(120,120,120,0.4)';
    }
    ctx.fillText(ring.data.year, x, y);
    ctx.restore();
  });
}

function drawHoverLabel() {
  if (app.hoveredRingIdx === null || app.phase === 'reading') return;
  const ring = tree.rings[app.hoveredRingIdx];
  const x = tree.cx;
  const y = tree.cy + tree.totalRadius + 42;

  ctx.save();
  ctx.font = '13px "Noto Serif SC", serif';
  const text = `${ring.data.emoji} ${ring.data.title}`;
  const m = ctx.measureText(text);
  const pw = m.width + 20;
  const ph = 30;

  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(15,15,15,0.92)';
  ctx.beginPath();
  const rx2 = x - pw / 2, ry2 = y - ph / 2, rr = 16;
  ctx.moveTo(rx2 + rr, ry2);
  ctx.lineTo(rx2 + pw - rr, ry2);
  ctx.arcTo(rx2 + pw, ry2, rx2 + pw, ry2 + rr, rr);
  ctx.lineTo(rx2 + pw, ry2 + ph - rr);
  ctx.arcTo(rx2 + pw, ry2 + ph, rx2 + pw - rr, ry2 + ph, rr);
  ctx.lineTo(rx2 + rr, ry2 + ph);
  ctx.arcTo(rx2, ry2 + ph, rx2, ry2 + ph - rr, rr);
  ctx.lineTo(rx2, ry2 + rr);
  ctx.arcTo(rx2, ry2, rx2 + rr, ry2, rr);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#e0e0e0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawFallingLeaves(time) {
  ctx.save();
  for (let i = 0; i < 8; i++) {
    const px = tree.cx + Math.sin(time * 0.002 + i * 1.7) * tree.totalRadius * 1.8;
    const py = ((time * 0.3 + i * 80) % (H + 40)) - 20;
    const scale = 0.3 + (i % 4) * 0.25;
    const flicker = 0.4 + Math.sin(time * 0.05 + i * 2) * 0.3;

    ctx.save();
    ctx.globalAlpha = flicker * 0.5;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#cccccc';
    ctx.beginPath();
    ctx.arc(px, py, 1.2 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

/* ============================================================
   年轮金色粒子 + 光柱系统
   ============================================================ */
const ringParticles = [];

function initRingParticles() {
  ringParticles.length = 0;
  tree.rings.forEach((ring, idx) => {
    const count = 3 + idx % 3;
    for (let i = 0; i < count; i++) {
      ringParticles.push({
        ringIdx: idx,
        angle: Math.random() * Math.PI * 2,
        speed: 0.0015 + Math.random() * 0.002,
        size: 0.8 + Math.random() * 1.6,
        alpha: 0.25 + Math.random() * 0.35,
        phase: Math.random() * Math.PI * 2,
        phaseSpeed: 0.03 + Math.random() * 0.04,
      });
    }
  });
}

function drawLightRays(time) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const numRays = 8;
  for (let i = 0; i < numRays; i++) {
    const angle = (i / numRays) * Math.PI * 2 + time * 0.0003;
    const halfWidth = 0.06;
    const x1 = tree.cx + Math.cos(angle - halfWidth) * tree.totalRadius;
    const y1 = tree.cy + Math.sin(angle - halfWidth) * tree.totalRadius;
    const x2 = tree.cx + Math.cos(angle + halfWidth) * tree.totalRadius;
    const y2 = tree.cy + Math.sin(angle + halfWidth) * tree.totalRadius;

    const grad = ctx.createLinearGradient(tree.cx, tree.cy, x1, y1);
    grad.addColorStop(0, 'rgba(255,255,255,0.04)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.015)');
    grad.addColorStop(1, 'transparent');

    ctx.beginPath();
    ctx.moveTo(tree.cx, tree.cy);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }
  ctx.restore();
}

function drawRingParticles(time) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ringParticles.forEach(p => {
    p.angle += p.speed;
    p.phase += p.phaseSpeed;
    const ring = tree.rings[p.ringIdx];
    if (!ring) return;

    const isActive = p.ringIdx === app.activeRingIdx && (app.phase === 'playing' || app.phase === 'reading');
    const isHover = p.ringIdx === app.hoveredRingIdx && app.phase === 'idle';

    const r = ring.midR;
    const x = tree.cx + Math.cos(p.angle) * r;
    const y = tree.cy + Math.sin(p.angle) * r;
    const flicker = 0.6 + Math.sin(p.phase) * 0.4;

    let alpha = p.alpha * flicker;
    let blur = 3;
    let size = p.size;

    if (isActive) {
      alpha = Math.min(1, alpha * 2.2);
      blur = 10;
      size = p.size * 1.5;
    } else if (isHover) {
      alpha = Math.min(1, alpha * 1.6);
      blur = 6;
      size = p.size * 1.2;
    }

    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = blur;
    ctx.fillStyle = isActive ? '#ffffff' : '#bbbbbb';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

/* ============================================================
   粒子流动系统——改编自 OpenProcessing Staircase Waterway (はぅ君)
   Perlin 噪声驱动：低噪声区横向流动(台阶)，高噪声区垂直落下(瀑布)
   ============================================================ */

// 紧凑 Perlin 噪声实现
const _perm = new Uint8Array(512);
(function() {
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) _perm[i] = p[i & 255];
})();
function _fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function _lerp(t, a, b) { return a + t * (b - a); }
function _grad(h, x, y, z) {
  const u = h < 8 ? x : y;
  const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
  return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
}
function perlin(x, y, z) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
  x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
  const u = _fade(x), v = _fade(y), w = _fade(z);
  const A = _perm[X] + Y, AA = _perm[A] + Z, AB = _perm[A + 1] + Z;
  const B = _perm[X + 1] + Y, BA = _perm[B] + Z, BB = _perm[B + 1] + Z;
  return _lerp(w,
    _lerp(v, _lerp(u, _grad(_perm[AA], x, y, z), _grad(_perm[BA], x-1, y, z)),
              _lerp(u, _grad(_perm[AB], x, y-1, z), _grad(_perm[BB], x-1, y-1, z))),
    _lerp(v, _lerp(u, _grad(_perm[AA+1], x, y, z-1), _grad(_perm[BA+1], x-1, y, z-1)),
              _lerp(u, _grad(_perm[AB+1], x, y-1, z-1), _grad(_perm[BB+1], x-1, y-1, z-1)))
  );
}

const particles = [];

class Particle {
  constructor(x, y, size, delay) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.alpha = 1;
    this.life = 1;
    this.delay = delay;
    this.age = 0;
    this.gravity = 0;
    this.scale = 1;
  }

  update(time) {
    this.age++;
    if (this.age < this.delay) return;

    // Staircase Waterway 核心逻辑
    const N = perlin(this.x / W, this.y / 9, time / W) * 0.5 + 0.5;

    if (N > 0.42) {
      // 瀑布区——垂直下落，重力加速
      this.gravity += 0.3;
      this.y += this.gravity;
    } else {
      // 台阶区——横向流动，缓慢下移
      this.x += (N % 0.1 > 0.05) ? 1.0 : -1.0;
      this.gravity = 0;
      this.y += 0.5;
    }

    this.scale *= 0.997;

    if (this.age - this.delay > 60) {
      this.life -= 0.006;
    }
    this.alpha = Math.max(0, this.life);
  }

  draw(ctx) {
    if (this.alpha <= 0.005 || this.age < this.delay) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#dddddd';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function createScatterParticles(text) {
  particles.length = 0;
  const card = document.getElementById('textCardInner');
  const rect = card.getBoundingClientRect();
  const bodyEl = document.getElementById('cardBody');
  const fontSize = parseInt(window.getComputedStyle(bodyEl).fontSize) || 16;
  const charsPerLine = Math.floor((rect.width - 40) / fontSize);
  const lineHeight = fontSize * 2;

  // 每个文字碎成多个光点
  const dotsPerChar = 5;

  let cx = rect.left + 20;
  let cy = rect.top + 55;
  let charCount = 0;
  let rowIdx = 0;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '\n' || charCount >= charsPerLine) {
      cx = rect.left + 20;
      cy += lineHeight;
      charCount = 0;
      rowIdx++;
      if (ch === '\n') continue;
    }
    if (cy > rect.bottom - 60) break;

    // 每个字符碎裂为多个金色光点
    for (let d = 0; d < dotsPerChar; d++) {
      const ox = (Math.random() - 0.5) * fontSize * 0.7;
      const oy = (Math.random() - 0.5) * fontSize * 0.7;
      const dotSize = 0.8 + Math.random() * 1.6;
      const delay = rowIdx * 4 + Math.random() * 15;
      particles.push(new Particle(cx + ox, cy + oy, dotSize, delay));
    }

    cx += fontSize;
    charCount++;
  }
}

function clearScatter() {
  // 移除残留的粒子
  const alive = particles.filter(p => p.life > 0.005);
  if (alive.length === 0) particles.length = 0;
}

/* ============================================================
   应用状态管理
   ============================================================ */
const app = {
  phase: 'idle',       // 'idle' | 'playing' | 'reading' | 'scattering'
  activeRingIdx: null,
  hoveredRingIdx: null,
  scatterTime: 0,
};

/* ============================================================
   音频播放
   ============================================================ */
const audioPlayer = document.getElementById('audioPlayer');
const audioIndicator = document.getElementById('audioIndicator');
const audioLabel = document.getElementById('audioLabel');

function playAudio(ringIdx) {
  const data = tree.rings[ringIdx].data;
  if (!data.audio) {
    // 无音频文件，直接显示文字
    showReadingCard(ringIdx);
    return;
  }

  audioPlayer.src = data.audio;
  audioPlayer.currentTime = 0;

  const playPromise = audioPlayer.play();
  if (playPromise !== undefined) {
    playPromise.then(() => {
      app.phase = 'playing';
      app.activeRingIdx = ringIdx;
      audioIndicator.classList.add('visible');
      audioLabel.textContent = `${data.year} · ${data.title}`;
    }).catch(() => {
      // 播放失败（如文件不存在），静默处理
      app.phase = 'idle';
      app.activeRingIdx = null;
    });
  }
}

function stopAudio() {
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  audioIndicator.classList.remove('visible');
  app.phase = app.phase === 'playing' ? 'idle' : app.phase;
  app.activeRingIdx = null;
}

audioPlayer.addEventListener('ended', () => {
  audioIndicator.classList.remove('visible');
  if (app.phase === 'playing') {
    app.phase = 'idle';
  }
});

audioPlayer.addEventListener('error', () => {
  audioIndicator.classList.remove('visible');
  app.phase = 'idle';
  app.activeRingIdx = null;
});

/* ============================================================
   文字卡片
   ============================================================ */
const textCard = document.getElementById('textCard');
const cardYear = document.getElementById('cardYear');
const cardTitle = document.getElementById('cardTitle');
const cardBody = document.getElementById('cardBody');
const cardClose = document.getElementById('cardClose');
const hint = document.getElementById('hint');

function showReadingCard(ringIdx) {
  const data = tree.rings[ringIdx].data;
  cardYear.textContent = data.year;
  cardTitle.textContent = `${data.emoji} ${data.title}`;
  cardBody.textContent = data.text;

  textCard.classList.add('visible');
  textCard.classList.remove('card-scattering');
  textCard.querySelector('.text-card-inner').style.animation = 'none';
  textCard.querySelector('.text-card-inner').offsetHeight;
  textCard.querySelector('.text-card-inner').style.animation = '';

  app.phase = 'reading';
  hint.classList.add('fading');
}

function hideReadingCard(scatter = true) {
  if (scatter && app.phase === 'reading') {
    // 启动飘散效果
    const text = cardBody.textContent;
    createScatterParticles(text);
    textCard.classList.add('card-scattering');
    app.phase = 'scattering';
    app.scatterTime = 0;
  } else {
    textCard.classList.remove('visible', 'card-scattering');
    app.phase = 'idle';
    hint.classList.remove('fading');
  }
}

cardClose.addEventListener('click', (e) => {
  e.stopPropagation();
  hideReadingCard(true);
});

textCard.addEventListener('click', (e) => {
  if (e.target === textCard) {
    hideReadingCard(true);
  }
});

/* ============================================================
   交互处理（触摸+鼠标）
   ============================================================ */
function hitTestRing(px, py) {
  const dx = px - tree.cx;
  const dy = py - tree.cy;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > tree.totalRadius + 10 || dist < 2) return null;

  // 从外向内查找（先匹配外层年轮）
  for (let i = tree.rings.length - 1; i >= 0; i--) {
    const ring = tree.rings[i];
    if (dist >= ring.innerR - 2 && dist <= ring.outerR + 2) {
      return i;
    }
  }
  return null;
}

function handleTap(px, py) {
  if (app.phase === 'scattering') return;
  if (app.phase === 'reading') {
    hideReadingCard(true);
    return;
  }

  const ringIdx = hitTestRing(px, py);
  if (ringIdx === null) return;

  if (app.phase === 'playing' && app.activeRingIdx === ringIdx) {
    // 正在播放此年轮 → 停止播放，显示文字
    stopAudio();
    showReadingCard(ringIdx);
  } else if (app.activeRingIdx === ringIdx) {
    // 再次点击已激活的年轮 → 显示文字
    showReadingCard(ringIdx);
  } else {
    // 首次点击 → 播放音频
    stopAudio();
    playAudio(ringIdx);
  }
}

function handleMove(px, py) {
  if (app.phase === 'reading' || app.phase === 'scattering') {
    app.hoveredRingIdx = null;
    return;
  }
  const ringIdx = hitTestRing(px, py);
  app.hoveredRingIdx = ringIdx;
}

// 触摸事件
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  handleMove(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  // 不变
});

// 鼠标事件（桌面调试用）
canvas.addEventListener('mousedown', (e) => {
  handleTap(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', (e) => {
  handleMove(e.clientX, e.clientY);
});

canvas.addEventListener('mouseleave', () => {
  app.hoveredRingIdx = null;
});

/* ============================================================
   动画主循环
   ============================================================ */
let time = 0;

function animate() {
  time++;
  ctx.clearRect(0, 0, W, H);

  drawTreeBackground();
  drawFineRings();
  drawLightRays(time);

  tree.rings.forEach((ring, i) => {
    let state = 'normal';
    if (i === app.activeRingIdx && (app.phase === 'playing' || app.phase === 'reading')) {
      state = 'active';
    } else if (i === app.hoveredRingIdx && app.phase === 'idle') {
      state = 'hover';
    }
    drawRing(ring, state);
  });

  drawCracks();
  drawCoreRing();
  drawKnots();
  drawBark();
  drawYearLabels();
  drawRingParticles(time);

  if (app.activeRingIdx !== null && app.phase === 'playing') {
    const ring = tree.rings[app.activeRingIdx];
    const pulse = Math.sin(time * 0.08) * 2 + 2;
    ctx.beginPath();
    ctx.arc(tree.cx, tree.cy, ring.outerR + pulse, 0, Math.PI * 2);
    ctx.arc(tree.cx, tree.cy, ring.innerR - pulse, 0, Math.PI * 2, true);
    ctx.strokeStyle = `rgba(255,255,255,${0.15 + Math.abs(Math.sin(time * 0.08)) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  drawHoverLabel();
  drawFallingLeaves(time);

  // 粒子系统
  if (app.phase === 'scattering') {
    app.scatterTime++;
    particles.forEach(p => {
      p.update(time);
      p.draw(ctx);
    });

    // 清除已消失的粒子
    const aliveCount = particles.filter(p => p.life > 0.005).length;
    if (aliveCount === 0 && app.scatterTime > 60) {
      particles.length = 0;
      textCard.classList.remove('visible', 'card-scattering');
      app.phase = 'idle';
      app.activeRingIdx = null;
      app.scatterTime = 0;
      hint.classList.remove('fading');
    }
  }

  requestAnimationFrame(animate);
}

/* ============================================================
   启动
   ============================================================ */
resize();
animate();
</script>
</body>
</html>
